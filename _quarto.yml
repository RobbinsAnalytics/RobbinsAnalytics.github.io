project:
  type: website
  output-dir: _site
  resources:
    - assets/thumb-portfolio.png
    - assets/thumb-staffing.png

website:
  title: "Robbins Analytics"
  description: "Business Intelligence & Analytics portfolio — Aaron Robbins"
  site-url: "https://robbinsanalytics.github.io"
  favicon: assets/img/favicon.ico
  open-graph: true
  twitter-card: true

  navbar:
    background: dark
    foreground: light
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Cascadia"
        href: cascadia.qmd
      - text: "Projects"
        menu:
          - text: "Cascadia Finance"
            href: projects/cascadia-semiconductors.qmd
          - text: "Cascadia BI Migration"
            href: projects/cascadia-bi-migration.qmd
          - text: "Cascadia Staffing"
            href: projects/cascadia-staffing.qmd
          - text: "Cascadia Pharmacy"
            href: projects/cascadia-pharmacy.qmd
          - text: "Cascadia Medical Devices"
            href: projects/cascadia-medical-devices.qmd
          - text: "Cascadia Clothing (Coming Soon)"
            href: projects/cascadia-clothing.qmd
    right:
      - icon: github
        href: https://github.com/RobbinsAnalytics
        aria-label: GitHub

  page-footer:
    left: "© 2026 Aaron Robbins"
    right:
      - icon: github
        href: https://github.com/RobbinsAnalytics
      - icon: linkedin
        href: https://www.linkedin.com/in/aaron-robbins-6b25a2136/

format:
  html:
    theme:
      - cosmo
      - styles.scss
    toc: false
    anchor-sections: false
    smooth-scroll: true
    link-external-newwindow: true
